# Agent Hub formal project mapping configuration.
# Keep secrets in environment variables, not in this file.

version: 1

self:
  id: agent-hub
  name:
    en: Agent Hub
    zh: Agent Hub 项目管理中心
  repository:
    name: TzexZhang/agent-hub
    url: https://github.com/TzexZhang/agent-hub
    default_branch: main

defaults:
  timezone: Asia/Shanghai
  secrets:
    github_token_env: GITHUB_TOKEN

capability_catalog:
  - id: github.repository_tracking
    name:
      en: GitHub Repository Tracking
      zh: GitHub 仓库跟踪
    status: active
  - id: github.update_retrieval
    name:
      en: GitHub Update Retrieval
      zh: GitHub 更新检索
    status: active
  - id: github.notification
    name:
      en: Notification System
      zh: 通知系统
    status: planned
  - id: github.report_generation
    name:
      en: Report Generation
      zh: 报告生成
    status: active
  - id: llm.multi_model_reporting
    name:
      en: Multi-Model Reporting
      zh: 多模型报告
    status: planned
  - id: runtime.scheduled_tasks
    name:
      en: Scheduled Tasks
      zh: 定时任务
    status: planned
  - id: ui.gradio
    name:
      en: Gradio UI
      zh: Gradio 图形界面
    status: planned
  - id: deploy.docker
    name:
      en: Docker Deployment
      zh: Docker 部署
    status: planned

projects:
  - id: github-sentinel
    name:
      en: GitHub Sentinel
      zh: GitHub 哨兵
    type: tool-agent
    path: ../github-sentinel
    owner: self
    status: bootstrap
    capabilities:
      - github.repository_tracking
      - github.update_retrieval
      - github.notification
      - github.report_generation
      - llm.multi_model_reporting
      - runtime.scheduled_tasks
      - ui.gradio
      - deploy.docker
    runtime:
      mode: cli
      command: python main.py
      alternatives:
        - mode: daemon
          command: python main.py --daemon
        - mode: web
          command: python gradio_app.py
    reports:
      default_language: zh-CN
      default_output_dir: ../github-sentinel/reports

repositories:
  - project_id: github-sentinel
    name: TzexZhang/agent-hub
    url: https://github.com/TzexZhang/agent-hub
    branch: main
    watch:
      commits: true
      issues: true
      pull_requests: true
      releases: true
    report:
      cadence: weekly
      language: zh-CN
      output_dir: ../github-sentinel/reports
